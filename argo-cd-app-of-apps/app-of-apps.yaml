apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
spec:
  destination:
    name: in-cluster
    namespace: argocd       # Namespace deines Argo CD-Servers
  source:
    repoURL: 'https://github.com/ninjainkognito/homelab'
    targetRevision: HEAD
    path: argo-cd-app-of-apps   # Dieser Ordner enthält dieses YAML
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
